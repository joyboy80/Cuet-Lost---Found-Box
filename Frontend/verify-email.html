<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - CUET Lost & Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="resources/cuetlogo.png" alt="CUET Logo" class="logo-img">
                <h2>CUET Lost & Found Box</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="verify-email.html" class="active">Verify Email</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-wrapper auth-wrapper-centered">
            <div class="auth-form-container auth-form-centered">
                <div class="auth-card otp-card">
                    <div class="auth-header-centered">
                        <div class="auth-icon">📧</div>
                        <h2 class="auth-title">Verify Your Email</h2>
                        <p class="auth-description">Enter the 6-digit OTP sent to your CUET email.</p>
                    </div>

                    <form id="verifyEmailForm" class="auth-form">
                        <div class="form-group">
                            <label for="email" class="form-label">
                                CUET Email <span class="required">*</span>
                            </label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-input"
                                placeholder="e.g. u2204094@student.cuet.ac.bd"
                                required
                                autocomplete="email"
                            >
                            <span class="error-message" id="emailError"></span>
                        </div>

                        <div class="form-group">
                            <label for="otp" class="form-label">
                                OTP Code <span class="required">*</span>
                            </label>
                            <input
                                type="text"
                                id="otp"
                                name="otp"
                                class="form-input otp-input"
                                placeholder="Enter 6-digit code"
                                maxlength="6"
                                inputmode="numeric"
                                autocomplete="one-time-code"
                                required
                            >
                            <span class="error-message" id="otpError"></span>
                        </div>

                        <button type="submit" class="btn btn-primary btn-large btn-block" id="verifyOtpBtn">
                            Verify Email
                        </button>
                    </form>

                    <div class="auth-divider">
                        <span>Didn't get the OTP?</span>
                    </div>

                    <a href="register.html" class="btn btn-outline btn-large btn-block">
                        Register Again
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script type="module" src="js/verify-email.js"></script>
</body>
</html>
